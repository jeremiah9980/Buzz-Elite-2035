name: Integrations Hub CI

on:
  pull_request:
    paths:
      - 'cms/integrations.*'
      - 'integrations/**'
      - '.github/workflows/integrations-ci.yml'
  push:
    branches: [main]
    paths:
      - 'cms/integrations.*'
      - 'integrations/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax checks
        run: npm run check
      - name: Integration hub tests
        run: npm test
