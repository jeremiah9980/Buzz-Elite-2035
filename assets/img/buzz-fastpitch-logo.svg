<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="buzz-title buzz-desc">
  <title id="buzz-title">Buzz Fastpitch Logo</title>
  <desc id="buzz-desc">Circular Buzz Fastpitch logo with gold ring, black hexagon, and white Buzz lettering.</desc>
  <defs>
    <radialGradient id="goldGlow" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="52%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <path id="topArc" d="M80 258a176 176 0 0 1 352 0"/>
    <path id="bottomArc" d="M432 250a176 176 0 0 1-352 0"/>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#060608"/>
  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="224" fill="url(#goldGlow)" filter="url(#shadow)"/>
  <!-- Dark separator ring -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="#060608" stroke-width="16"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="160" fill="#060608"/>
  <!-- Inner ring accent -->
  <circle cx="256" cy="256" r="152" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.55"/>

  <!-- Arc text: BUZZ -->
  <text font-family="'Arial Black', Impact, sans-serif" font-size="52" font-weight="900" letter-spacing="18" fill="#060608">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">BUZZ</textPath>
  </text>
  <!-- Arc text: FASTPITCH -->
  <text font-family="'Arial Black', Impact, sans-serif" font-size="40" font-weight="900" letter-spacing="12" fill="#060608">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">FASTPITCH</textPath>
  </text>

  <!-- Hexagon honeycomb motif -->
  <polygon points="256,118 314,150 314,214 256,246 198,214 198,150"
           fill="none" stroke="#F59E0B" stroke-width="4" opacity="0.55"/>

  <!-- Center B letter -->
  <text x="256" y="306" text-anchor="middle"
        font-family="'Arial Black', Impact, sans-serif"
        font-size="148" font-weight="900"
        fill="#FFFFFF"
        stroke="#060608" stroke-width="14" paint-order="stroke fill">B</text>
</svg>
