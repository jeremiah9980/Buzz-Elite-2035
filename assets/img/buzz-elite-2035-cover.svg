<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Buzz Elite 2035 Cover Image</title>
  <desc id="desc">Night softball field cover art with red, black, white Buzz Elite 2035 branding.</desc>
  <defs>
    <radialGradient id="skyGlow" cx="50%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#5a0508" stop-opacity=".95"/>
      <stop offset="42%" stop-color="#09090d"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="field" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2a110a"/>
      <stop offset=".5" stop-color="#482015"/>
      <stop offset="1" stop-color="#170906"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0" x2="1">
      <stop offset="0" stop-color="#4a0005"/>
      <stop offset=".5" stop-color="#ff1616"/>
      <stop offset="1" stop-color="#4a0005"/>
    </linearGradient>
    <filter id="redGlow" x="-30%" y="-30%" width="160%" height="160%">
