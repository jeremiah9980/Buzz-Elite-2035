<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Buzz Elite 2035 Gilliland Logo</title>
  <desc id="desc">Red, black, white metallic Buzz Elite 2035 Gilliland team logo.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#410606"/>
      <stop offset="45%" stop-color="#07080b"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="redMetal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff1b1b"/>
      <stop offset=".28" stop-color="#7b0008"/>
      <stop offset=".52" stop-color="#f8f8f8"/>
      <stop offset=".72" stop-color="#b00010"/>
      <stop offset="1" stop-color="#ff3a3a"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".16" stop-color="#6f747b"/>
      <stop offset=".35" stop-color="#f7f7f7"/>
      <stop offset=".60" stop-color="#111317"/>
      <stop offset=".82" stop-color="#e8e8e8"/>
      <stop offset="1" stop-color="#5f646c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ff1717" flood-opacity=".78"/>
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".7"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity=".85"/>
    </filter>
    <pattern id="texture" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M0 22 L22 0 M8 28 L28 8" stroke="#ff2020" stroke-opacity=".11" stroke-width="2"/>
      <circle cx="5" cy="6" r="1.2" fill="#fff" fill-opacity=".12"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#texture)" opacity=".9"/>
  <g opacity=".65">
    <path d="M92 154 L600 74 L1108 154 L1027 605 L600 822 L173 605 Z" fill="none" stroke="#ff1515" stroke-width="8" filter="url(#glow)"/>
    <path d="M128 184 L600 112 L1072 184 L998 576 L600 780 L202 576 Z" fill="rgba(0,0,0,.45)" stroke="url(#chrome)" stroke-width="18"/>
    <path d="M181 225 L600 160 L1019 225" fill="none" stroke="#ffffff" stroke-opacity=".68" stroke-width="3"/>
    <path d="M205 575 L600 748 L995 575" fill="none" stroke="#ff1515" stroke-opacity=".86" stroke-width="4"/>
  </g>
  <g filter="url(#shadow)">
    <text x="600" y="412" text-anchor="middle" font-family="Brush Script MT, Segoe Script, cursive" font-size="365" font-weight="900" fill="#020203" stroke="url(#redMetal)" stroke-width="18" paint-order="stroke fill">B</text>
    <text x="600" y="412" text-anchor="middle" font-family="Brush Script MT, Segoe Script, cursive" font-size="365" font-weight="900" fill="none" stroke="#ffffff" stroke-opacity=".82" stroke-width="3">B</text>
  </g>
  <g filter="url(#glow)">
    <text x="600" y="620" text-anchor="middle" font-family="Impact, Barlow Condensed, Arial Black, sans-serif" font-size="116" font-style="italic" font-weight="900" letter-spacing="9" fill="#050507" stroke="url(#chrome)" stroke-width="12" paint-order="stroke fill">ELITE</text>
    <text x="600" y="735" text-anchor="middle" font-family="Impact, Barlow Condensed, Arial Black, sans-serif" font-size="150" font-style="italic" font-weight="900" letter-spacing="8" fill="url(#redMetal)" stroke="#eeeeee" stroke-width="8" paint-order="stroke fill">2035</text>
    <text x="600" y="813" text-anchor="middle" font-family="Impact, Barlow Condensed, Arial Black, sans-serif" font-size="54" font-style="italic" font-weight="900" letter-spacing="15" fill="#d7d7d7" stroke="#5b0007" stroke-width="2">GILLILAND</text>
  </g>
  <path d="M115 810 C260 785 316 790 440 812 C552 832 668 832 780 812 C904 790 960 785 1085 810" fill="none" stroke="#ff1515" stroke-opacity=".36" stroke-width="3"/>
</svg>
